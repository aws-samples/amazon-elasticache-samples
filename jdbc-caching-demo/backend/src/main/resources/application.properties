server.port=8080
spring.jackson.serialization.indent-output=true
spring.web.resources.static-locations=classpath:/static/

# DB defaults (overridden by .env)
db.host=${DB_HOST:127.0.0.1}
db.port=${DB_PORT:5432}
db.name=${DB_NAME:testdb}
db.user=${DB_USER:dbadmin}
db.password=${DB_PASSWORD:TempPassword12345}

# Cache defaults
cache.endpoint=${CACHE_ENDPOINT:127.0.0.1:6379}
cache.use-ssl=${CACHE_USE_SSL:false}
cache.name=${CACHE_NAME:}
cache.iam-region=${CACHE_IAM_REGION:us-east-1}
